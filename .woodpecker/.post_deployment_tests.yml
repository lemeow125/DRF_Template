steps:
  - name: run post-deployment tests
    image: ghcr.io/usebruno/cli:3.5.1-alpine
    environment:
      BACKEND_ADMIN_EMAIL: 
        from_secret: DEV_EMAIL
      BACKEND_PASSWORD:
        from_secret: DEV_PASSWORD
    commands:
      - cd .bruno
      - bru run --env dev
      
when:
  - branch: master
    event:
      - push
      - manual

depends_on:
  - deploy