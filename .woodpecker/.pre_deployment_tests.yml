steps:
  - name: run pre-deployment tests
    image: node:23-alpine
    environment:
      BACKEND_DEBUG_USER_USERNAME: 
        from_secret: BACKEND_DEBUG_USER_USERNAME
      BACKEND_DEBUG_USER_PASSWORD:
        from_secret: BACKEND_DEBUG_USER_PASSWORD
    commands:
      - npm install -g @usebruno/cli --cache /tmp/.npm --prefer-offline
      - apk add curl
      - curl --retry 60 --retry-connrefused --retry-delay 5 --fail http://api:8000/api/v1/swagger/
      - cd .bruno
      - bru run --env docker
    volumes:
      - /tmp/.npm:/tmp/.npm
      - /var/cache/apk:/etc/apk/cache

when:
  - branch: master
    event:
      - push
      - manual

depends_on:
  - unit_tests

services:
  api:
    image: git.06222001.xyz/keannu125/drf_template:${CI_COMMIT_SHA}
    environment:
      BACKEND_DEBUG_USER_EMAIL:
        from_secret: BACKEND_DEBUG_USER_EMAIL
      BACKEND_DEBUG_USER_USERNAME: 
        from_secret: BACKEND_DEBUG_USER_USERNAME
      BACKEND_DEBUG_USER_PASSWORD:
        from_secret: BACKEND_DEBUG_USER_PASSWORD
      BACKEND_DEBUG: true
      BACKEND_GENERATE_CONFIG: true
      DJANGO_SETTINGS_MODULE: tests.settings
      RUN_TYPE: api
      SKIP_STATIC: true

