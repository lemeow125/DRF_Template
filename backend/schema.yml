components:
  schemas:
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    Checkout:
      type: object
      properties:
        subscription_id:
          type: integer
        annual:
          type: boolean
      required:
      - annual
      - subscription_id
    CustomUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        avatar:
          type: string
          format: uri
        first_name:
          type: string
          maxLength: 150
        is_new:
          type: string
          readOnly: true
        last_name:
          type: string
          maxLength: 150
        user_group:
          type: integer
          readOnly: true
          nullable: true
        group_member:
          type: string
          readOnly: true
        group_owner:
          type: string
          readOnly: true
      required:
      - avatar
      - email
      - group_member
      - group_owner
      - id
      - is_new
      - user_group
      - username
    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
        content:
          type: string
          readOnly: true
          nullable: true
        dismissed:
          type: boolean
        recipient:
          type: integer
          readOnly: true
      required:
      - content
      - id
      - recipient
      - timestamp
    PasswordResetConfirm:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - token
      - uid
    PatchedCustomUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        avatar:
          type: string
          format: uri
        first_name:
          type: string
          maxLength: 150
        is_new:
          type: string
          readOnly: true
        last_name:
          type: string
          maxLength: 150
        user_group:
          type: integer
          readOnly: true
          nullable: true
        group_member:
          type: string
          readOnly: true
        group_owner:
          type: string
          readOnly: true
    PatchedNotification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
        content:
          type: string
          readOnly: true
          nullable: true
        dismissed:
          type: boolean
        recipient:
          type: integer
          readOnly: true
    SendEmailReset:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    SetPassword:
      type: object
      properties:
        new_password:
          type: string
        current_password:
          type: string
      required:
      - current_password
      - new_password
    SetUsername:
      type: object
      properties:
        current_password:
          type: string
        new_username:
          type: string
          title: Username
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
      required:
      - current_password
      - new_username
    SubscriptionPlan:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
          maxLength: 1024
        annual_price:
          type: integer
          nullable: true
        monthly_price:
          type: integer
          nullable: true
        group_exclusive:
          type: boolean
      required:
      - id
      - name
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TokenVerify:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
      required:
      - token
    UserRegistration:
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        password:
          type: string
          writeOnly: true
        first_name:
          type: string
        last_name:
          type: string
      required:
      - email
      - first_name
      - last_name
      - password
      - username
    UserSubscription:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          nullable: true
        user_group:
          type: integer
          nullable: true
        subscription:
          type: integer
          nullable: true
        date:
          type: string
          format: date-time
          readOnly: true
        valid:
          type: boolean
        annual:
          type: boolean
      required:
      - annual
      - date
      - id
      - valid
    UsernameResetConfirm:
      type: object
      properties:
        new_username:
          type: string
          title: Username
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
      required:
      - new_username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
